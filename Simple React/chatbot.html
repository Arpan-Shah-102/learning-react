<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
      }
      body {
        margin: 20px 10px;
        display: flex;
        flex-direction: column;
      }
      button {
        background-color: rgb(25, 135, 84);
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
      }
      input {
        padding: 12px 15px;
        border-radius: 10px;
        border: 1px solid rgb(25, 135, 84);
        font-size: 15px;
        flex-grow: 1;
        max-width: 600px;
      }
      .flex-container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;

        &.input-container {
          position: sticky;
          top: 20px;

          &.bottom {
            top: auto;
            bottom: 50px;
          }
        }
        &.robot {
          justify-content: flex-start;
          align-items: flex-start;
          align-self: flex-start;
        }
        &.user {
          justify-content: flex-end;
          align-items: flex-start;
          align-self: flex-end;
        }
        & p {
          max-width: 300px;
          padding: 12px 15px;
          border-radius: 10px;
          background-color: rgb(238, 238, 238);
          font-size: 15px;
        }
      }
      .message-container {
        max-width: 685px;
        flex-direction: column;
        margin: 0 auto;
        height: calc(100vh - 85px);
        overflow-y: auto;
        padding: 15px 0;
        scrollbar-width: none;
        scroll-behavior: smooth;
        justify-content: flex-start;
        gap: 0;
      }
      .empty-message {
        color: rgb(150, 150, 150);
        min-width: 100% !important;
        background-color: transparent !important;
        padding: 0 !important;
        text-align: center;
      }
      .move-text-input {
        text-align: center;
        color: rgb(25, 135, 85);
        text-decoration: underline;
        cursor: pointer;
        margin-bottom: 10px;
        position: fixed;
        bottom: 5px;
        left: 50%;
        transform: translateX(-50%);
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      const container = document.querySelector('.js-container');
      const root = ReactDOM.createRoot(container);

      function ChatInput({ chatMessages, setChatMessages, bottom }) {
        const [inputText, setInputText] = React.useState('');
        const [isLoading, setIsLoading] = React.useState(false);

        function saveInputText(event) {
          setInputText(event.target.value);
        }

        async function sendMessage() {
          if (inputText === '' || isLoading) {
            return;
          }
          const newChatMessages = [
            ...chatMessages,
            {
              message: inputText,
              sender: "user"
            }
          ];

          setChatMessages(newChatMessages);
          setInputText('');
          setIsLoading(true);
          setChatMessages([
            ...newChatMessages,
            {
              message: (
                <img
                  height="40px"
                  style={{margin: '-10px'}}
                  src="https://supersimple.dev/images/loading-spinner.gif"
                  alt="Loading Spinner"
                />
              ),
              sender: "robot"
            }
          ]);
          const response = await Chatbot.getResponseAsync(inputText);
          setChatMessages([
            ...newChatMessages,
            {
              message: response,
              sender: "robot"
            }
          ]);
          setIsLoading(false);
        }

        function handleKeyDown(event) {
          if (event.value === '' || isLoading) {
            return;
          }
          if (event.key === 'Enter') {
            sendMessage();
          } else if (event.key === 'Escape') {
            setInputText('');
          }
        }

        return (
          <div className={`flex-container input-container${bottom ? ' bottom' : ''}`}>
            <input
              placeholder="Send a message to Chatbot"
              size="30"
              type="text"
              value={inputText}
              onChange={saveInputText}
              onKeyDown={handleKeyDown}
            />
            <button onClick={sendMessage}>Send</button>
          </div>
        );
      }

      function ChatMessage({ message, sender }) {
        return(
          <div className={`flex-container ${sender}`}>
            {sender === 'robot' && (
              <img width="50" src="./assets/robot.png" alt="Robot Icon" />
            )}
            <p>{message}</p>
            {sender === 'user' && (
              <img width="50" src="./assets/user.png" alt="User Icon" />
            )}
          </div>
        );
      }

      function ChatMessages({ chatMessages }) {
        const chatMessagesRef = useAutoScroll([chatMessages]);

        if (chatMessages.length === 0) {
          return (
            <div
              className="flex-container message-container"
              ref={chatMessagesRef}
            >
              <p
                className="empty-message"
              >
                Welcome to the chatbot project! Send a message using the textbox below.
              </p>
            </div>
          );
        }
        return (
          <div
            className="flex-container message-container"
            ref={chatMessagesRef}
          >
            {chatMessages.map((chatMessage, index) => {
              return (
                <ChatMessage
                  message={chatMessage.message}
                  sender={chatMessage.sender}
                  key={index}
                />
              );
            })}
          </div>
        );
      }

      function useAutoScroll(dependencies) {
        const chatMessagesRef = React.useRef(null);
        React.useEffect(() => {
          const containerElement = chatMessagesRef.current;
          console.log(containerElement);
          if (containerElement) {
            containerElement.scrollTop = containerElement.scrollHeight;
          }
        }, dependencies);
        return chatMessagesRef;
      }

      function MoveChatInputDown({bottom, setBottom}) {
        function toggleBottom() {
          setBottom(!bottom);
        }

        return (
          <>
            <p
              className="move-text-input"
              onClick={toggleBottom}
            >
              Move textbox to {bottom ? 'top' : 'bottom'}
            </p>
          </>
        )
      }

      function App() {
        const [chatMessages, setChatMessages] = React.useState([]);
        const [bottom, setBottom] = React.useState(false);

        if (bottom) {
          return (
            <>
              <ChatMessages
                chatMessages={chatMessages}
              />
              <ChatInput
                chatMessages={chatMessages}
                setChatMessages={setChatMessages}
                bottom={bottom}
              />
              <MoveChatInputDown
                bottom={bottom}
                setBottom={setBottom}
              />
            </>
          );
        }
        return (
          <>
            <ChatInput
              chatMessages={chatMessages}
              setChatMessages={setChatMessages}
              bottom={bottom}
            />
            <ChatMessages
              chatMessages={chatMessages}
            />
            <MoveChatInputDown
              bottom={bottom}
              setBottom={setBottom}
            />
          </>
        );
      }

      root.render(<App />);
    </script>
  </body>
</html>
